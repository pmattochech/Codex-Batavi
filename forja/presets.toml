# Presets: caminhos relativos à pasta forja/ (onde está este arquivo).
# prompt_node_id = ID do CLIPTextEncode do prompt POSITIVO (ex.: "6").
# vazio = autodetectar o primeiro CLIPTextEncode com inputs.text (cuidado se houver 6 e 7).
# O prompt NEGATIVO (ex. nó "7") não é alterado pela CLI: fica o texto do workflow_api.json
# ou você reexporta o grafo no ComfyUI depois de editar o segundo campo.
#
# Depois de exportar o workflow em API Format no ComfyUI, salve-o em workflows/
# e ajuste o nome em [presets.<nome>].

[presets.default]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

# Retrato / cena / personagem: todos usam o MESMO JSON até você duplicar o grafo no ComfyUI.
[presets.portrait]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

[presets.scene]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

[presets.alaric_armor]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

# Demonstração genérica grimdark (mesmo grafo ComfyUI; outras pipelines podem apontar para outros JSON depois).
[presets.grimdark_character]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"
