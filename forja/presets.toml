# Presets: paths relative to forja/ (this file’s folder).
# prompt_node_id = POSITIVE prompt CLIPTextEncode ID (e.g. "6").
# empty = auto-pick first CLIPTextEncode with inputs.text (watch for nodes 6 and 7).
# The NEGATIVE prompt (e.g. node "7") is NOT changed by the CLI: it stays as in workflow_api.json
# or re-export the graph from ComfyUI after editing the second field.
#
# After exporting the workflow in API Format from ComfyUI, save it under workflows/
# and adjust the name in [presets.<name>].

[presets.default]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

# Portrait / scene / character: all use the SAME JSON until you duplicate the graph in ComfyUI.
[presets.portrait]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

[presets.scene]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

[presets.alaric_armor]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"

# Generic grimdark demo (same ComfyUI graph; other pipelines can point at other JSON later).
[presets.grimdark_character]
workflow = "workflows/workflow_api.json"
prompt_node_id = "6"
