# Pushes Markdown under codex-batavi/ to Notion when a version tag is published.
# Uses the same tag-to-tag diff as local sync (previous v* tag .. current tag).
#
# Repository secrets (Settings → Secrets → Actions):
#   NOTION_TOKEN, NOTION_PARENT_PAGE_ID, NOTION_NEWS_PAGE_ID
#
# Commit tools/notion-sync/page-map.json so CI can update existing Notion pages.

name: Notion sync on tag

on:
  push:
    tags:
      - "v*"

concurrency:
  group: notion-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (full history and tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/notion-sync/package-lock.json

      - name: Install dependencies
        working-directory: tools/notion-sync
        run: npm ci

      - name: Sync Markdown to Notion
        working-directory: tools/notion-sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOTION_NEWS_PAGE_ID: ${{ secrets.NOTION_NEWS_PAGE_ID }}
          # sync.mjs uses GITHUB_REF for current tag when TAG_REF is unset (CI default)
        run: node sync.mjs
